name: 'google_search_tool'
description: |
  该工具可以用来进行谷歌搜索，工具的输入是你想搜索的内容, 必须是完整的 json 格式。
  Args:
        input: 完整代码
  工具输入示例：
    示例1: 你想要搜索上海的天气时，工具的输入应该是：{"input": "上海的天气"}
    示例2: 你想要搜索日本的天气时，工具的输入应该是：{"input": "日本的天气"}
tool_type: 'api'
input_keys: ['input']
metadata:
  type: 'TOOL'
  module: 'agentuniverse.agent.action.tool.common_tool.google_search_tool'
  class: 'GoogleSearchTool'