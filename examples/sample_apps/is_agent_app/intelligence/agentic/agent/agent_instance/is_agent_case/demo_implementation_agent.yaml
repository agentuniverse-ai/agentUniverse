info:
  name: 'demo_implementation_agent'
  description: 'Demo implementation agent for executing tasks at checkpoints'

profile:
  # Prompt configuration
  prompt_version: 'demo_implementation_agent.cn'

  # LLM configuration
  llm_model:
    name: 'qwen_llm'
    model_name: 'qwen-max'
    temperature: 0.7

  # Memory configuration
  memory:
    name: 'demo_memory'

metadata:
  type: 'AGENT'
  module: 'agentuniverse.agent.template.implementation_agent_template'
  class: 'ImplementationAgentTemplate'
