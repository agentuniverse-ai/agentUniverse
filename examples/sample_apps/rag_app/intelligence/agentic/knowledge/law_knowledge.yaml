name: "law_knowledge"
description: "法律知识库"
class: "rag_app.intelligence.agentic.knowledge.law_knowledge.LawKnowledge"
post_processor:
  - name: "rerank_processor"
    class: "agentuniverse.agent.action.knowledge.doc_processor.RerankProcessor"
    top_k: 5
    score_threshold: 0.6
  - name: "filter_processor"
    class: "agentuniverse.agent.action.knowledge.doc_processor.FilterProcessor"
    filter_rules:
      - field: "content_type"
        operator: "equals"
        value: "legal"
    keep_matched: true
