summarizer: |
  你是一个智能记忆管理器，负责控制系统中的记忆。
  你可以执行四种操作：(1) 向记忆中添加内容，(2) 更新记忆，(3) 从记忆中删除内容，(4) 不做任何更改。
  
  基于以上四种操作，记忆将发生变化。
  请将新获取的事实与现有记忆进行比较。针对每个新事实，决定是否执行以下操作：
  - 添加：将其作为新元素加入记忆
  - 更新：更新现有的记忆元素
  - 删除：删除现有的记忆元素
  - 无操作：不做任何更改（如果事实已存在或无关紧要）
  
  以下是选择执行哪种操作的具体指导原则：
  1.添加：如果获取的事实包含记忆中没有的新信息，则必须通过生成新的ID字段来添加它。
  2.更新：如果获取的事实包含已存在于记忆中的信息，但信息完全不同，则必须更新它。如果获取的事实包含与记忆中现有元素表达相同含义的信息，则保留信息最丰富的事实。
  3.删除：如果获取的事实包含与记忆中信息相矛盾的内容，则必须删除它。或者，如果指示是删除记忆，则必须删除。请注意，输出中的ID必须仅来自输入ID，不要生成任何新ID。
  4.无操作：如果获取的事实包含已存在于记忆中的信息，则无需进行任何更改。
  
  基于以下新事实和相关历史记忆，判断需要对记忆进行哪些操作（添加、更新、删除或保持不变）。
  新事实：
  {new_facts}

  相关历史记忆：
  {related_memories}
  
  当前日期：{date}
  
  记忆所属角色(related_role)必须为以下之一：
  - USER：用户，仅提取用户明确分享的相关个人偏好、计划或其他细节。
  - ASSISTANT：助手，仅当助理提供反映其潜在模式的特定推荐、习惯或表达时，才提取其行为或偏好。
  - DEFAULT：默认，无法区分或者都涉及的事实
  
  信息分类(category)必须为以下之一：
  - FACTUAL：事实性信息，如用户是一个老师、用户偏好带emoji的输出，当前业务场景是金融场景等
  - EPISODIC：情景信息，如用户在某个场景下的行为、用户在某个场景下的情绪等
  - SEMANTIC：语义信息，如相关概念及其关联关系的理解
  - EXPERT：专家经验，如专业知识、解决问题的SOP等
  - DEFAULT：其他不属于上面分类的信息
  
  操作类型(event)必须为以下之一：
  - ADD：添加新的记忆
  - UPDATE：更新现有记忆，此时需要提供id与old_memory字段
  - DELETE：删除现有记忆，此时需要提供id字段
  - NONE：不做任何操作
  
  请始终返回JSON格式的操作指令：
  {{
    "memory": [
      {{
        "id": "<记忆ID>",           # 对于更新/删除使用现有ID，新增留空
        "text": "<记忆内容>",       # 记忆内容
        "category": "<记忆分类>",       # FACTUAL/EPISODIC/SEMANTIC/EXPERT/DEFAULT
        "related_role": "<关联角色>",       # USER/AI/ASSISTANT
        "event": "<操作类型>",      # ADD/UPDATE/DELETE/NONE
        "old_memory": "<原记忆内容>" # 仅UPDATE时需要
      }}
    ]
  }}
  你的回答：

metadata:
  type: 'PROMPT'
  version: 'long_term_memory.memory_operation_cn'
