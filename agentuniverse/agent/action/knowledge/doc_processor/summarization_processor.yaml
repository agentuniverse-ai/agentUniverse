name: 'summarization_processor'
description: 'Recall post-processor that summarizes retrieved documents (LLM abstractive or extractive fallback), addressing the summarization direction of issue #248.'

metadata:
  type: 'DOC_PROCESSOR'
  module: 'agentuniverse.agent.action.knowledge.doc_processor.summarization_processor'
  class: 'SummarizationProcessor'

# --- Operating mode ---
# When llm_name is set, an abstractive summary is generated by that LLM component.
# When llm_name is empty/null, a dependency-free extractive summary is produced.
llm_name: ''              # e.g. 'default_openai_llm'

# --- Input control ---
# Maximum number of retrieved documents fed into the summarizer.
max_input_docs: 10

# --- Extractive mode ---
# Number of top sentences kept by the extractive summarizer (ignored in LLM mode).
max_sentences: 5
# Bias the summary towards the query (extractive: boosts query-term sentences;
# LLM: asks the model to focus on the query).
query_aware: true

# --- LLM mode ---
# Custom instruction prepended to the LLM prompt (ignored in extractive mode).
summary_instruction: 'Summarize the following retrieved documents into a concise, coherent summary. Preserve the key facts and findings. Remove redundancy and irrelevant information.'
# Optional output-language hint for the LLM summary, e.g. 'Chinese' (ignored in extractive mode).
language: ''
