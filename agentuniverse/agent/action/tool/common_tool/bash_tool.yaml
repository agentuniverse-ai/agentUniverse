name: 'Bash'
description: |
  Execute shell commands on the local machine.
  Supports both blocking (synchronous) and non-blocking (asynchronous) execution.
  Returns stdout, stderr, exit code, and duration.
tool_type: 'api'
input_keys: ['command', 'cwd']
