name: 'context_rename_file'
description: |
  该工具可以将一个上下文中的文件重命名为新的名称。
  
  输入参数（JSON格式）：
  ```json
  {
    "old_file_name": "原文件名（字符串，必需）",
    "new_file_name": "新文件名（字符串，必需）",
    "session_id": "会话ID（字符串，必需）"
  }
  ```
  
  输出参数（JSON格式）：
  ```json
  {
    "message": "操作结果消息（字符串）"
  }
  ```
  
  工具输入示例（JSON格式）：
  ```json
  {
    "old_file_name": "old.md",
    "new_file_name": "new.md",
    "session_id": "your_session_id"
  }
  ```
tool_type: 'func'
input_keys: ['old_file_name', 'new_file_name', 'session_id']
metadata:
  type: 'TOOL'
  module: 'agentuniverse.agent.action.tool.context_tool.context_rename_file'
  class: 'ContextRenameFileTool'
