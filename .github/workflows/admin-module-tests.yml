name: Admin Module Tests

on:
  pull_request:
    paths:
      - 'agentuniverse_product/service/admin_service/**'
      - 'agentuniverse/agent_serve/web/flask_server.py'
      - 'tests/test_agentuniverse/unit/agent_serve/test_admin_*.py'
  push:
    branches:
      - 'feat/admin-*'
    paths:
      - 'agentuniverse_product/service/admin_service/**'
      - 'tests/test_agentuniverse/unit/agent_serve/test_admin_*.py'

jobs:
  admin-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]" 2>/dev/null || pip install -e .
          pip install pytest pytest-mock

      - name: Run admin module unit tests
        run: |
          pytest tests/test_agentuniverse/unit/agent_serve/test_admin_resource_service.py \
                 tests/test_agentuniverse/unit/agent_serve/test_admin_trace_service.py \
                 tests/test_agentuniverse/unit/agent_serve/test_admin_monitoring_service.py \
                 tests/test_agentuniverse/unit/agent_serve/test_admin_guardrail_service.py \
                 tests/test_agentuniverse/unit/agent_serve/test_admin_otel_span_reader.py -q --tb=short
